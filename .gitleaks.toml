title = "Tournamental gitleaks config"

# Extend the bundled default ruleset (don't replace it).
[extend]
useDefault = true

# Allowlist:
#   - .env.example: documentation file with empty/placeholder values.
#     Real secrets live in .env (gitignored) and the deployment secret store.
#   - sessions/, docs/: occasional embedded fixtures and doc examples.
#   - test/spec files: legitimately use named "secret"/"key" identifiers
#     with high-entropy strings to exercise HMAC/JWT helpers.
[allowlist]
description = "Documentation, fixtures, and config templates"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)\.env\.example\.[^/]+$''',
  '''^docs/.*\.md$''',
  '''^sessions/.*\.md$''',
  '''(^|/)(tests?|__tests__)/.*\.(ts|tsx|js|jsx)$''',
  '''.*\.(test|spec)\.(ts|tsx|js|jsx)$''',
]
