<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <title>World Cup Predictor - BBC Sport</title>
</head>
<body>
  <main>
    <header>
      <span class="qa-share-handle">@predictor_pro</span>
    </header>
    <section data-testid="predictor-bracket" class="qa-predictor">

      <h2>Group stage</h2>
      <div class="qa-fixture" data-stage="group" data-fixture-id="grp-a-01" data-kickoff="2026-06-11T20:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Argentina</span>
        <span class="qa-fixture__team qa-fixture__team--away">France</span>
        <span class="qa-fixture__pick" data-picked="home">Argentina</span>
      </div>
      <div class="qa-fixture" data-stage="group" data-fixture-id="grp-a-02" data-kickoff="2026-06-12T18:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Brazil</span>
        <span class="qa-fixture__team qa-fixture__team--away">Portugal</span>
        <span class="qa-fixture__pick" data-picked="draw">Draw</span>
      </div>

      <h2>Round of 16</h2>
      <div class="qa-fixture" data-stage="r16" data-fixture-id="r16-01" data-kickoff="2026-06-29T19:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Argentina</span>
        <span class="qa-fixture__team qa-fixture__team--away">Mexico</span>
        <span class="qa-fixture__pick" data-picked="home">Argentina</span>
      </div>
      <div class="qa-fixture" data-stage="r16" data-fixture-id="r16-02" data-kickoff="2026-06-29T22:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Germany</span>
        <span class="qa-fixture__team qa-fixture__team--away">Spain</span>
        <span class="qa-fixture__pick" data-picked="away">Spain</span>
      </div>

      <h2>Quarter-finals</h2>
      <div class="qa-fixture" data-stage="qf" data-fixture-id="qf-01" data-kickoff="2026-07-04T19:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Argentina</span>
        <span class="qa-fixture__team qa-fixture__team--away">Spain</span>
        <span class="qa-fixture__pick" data-picked="home">Argentina</span>
      </div>

      <h2>Semi-finals</h2>
      <div class="qa-fixture" data-stage="sf" data-fixture-id="sf-01" data-kickoff="2026-07-09T20:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Argentina</span>
        <span class="qa-fixture__team qa-fixture__team--away">England</span>
        <span class="qa-fixture__pick" data-picked="home">Argentina</span>
      </div>

      <h2>Final</h2>
      <div class="qa-fixture" data-stage="final" data-fixture-id="final-01" data-kickoff="2026-07-19T19:00:00Z">
        <span class="qa-fixture__team qa-fixture__team--home">Argentina</span>
        <span class="qa-fixture__team qa-fixture__team--away">Netherlands</span>
        <span class="qa-fixture__pick" data-picked="home">Argentina</span>
      </div>

      <aside>
        <div class="qa-champion">
          <span class="qa-team-name">Argentina</span>
        </div>
        <div class="qa-runner-up">
          <span class="qa-team-name">Netherlands</span>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
