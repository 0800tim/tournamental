<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>World Cup 2026 Predictor, The Telegraph</title>
</head>
<body>
<main>
<div class="bracket-predictor" data-tournament="fifa-wc-2026" data-user-handle="Jamie Carragher">
  <header>
    <h1>World Cup 2026 Predictor</h1>
    <p>Jamie Carragher's filled bracket.</p>
  </header>

  <!-- A handful of group-stage picks so the parser walks both kinds. -->
  <section class="bracket-predictor__group" data-group="A">
    <article class="bracket-predictor__match" data-match-id="grpA-m1" data-kickoff="2026-06-11T20:00:00Z">
      <div class="bracket-predictor__team bracket-predictor__team--home bracket-predictor__team--selected" data-team="Mexico">Mexico</div>
      <div class="bracket-predictor__team bracket-predictor__team--away" data-team="Canada">Canada</div>
    </article>
  </section>
  <section class="bracket-predictor__group" data-group="C">
    <article class="bracket-predictor__match" data-match-id="grpC-m1" data-kickoff="2026-06-15T20:00:00Z">
      <div class="bracket-predictor__team bracket-predictor__team--home" data-team="Brazil">Brazil</div>
      <div class="bracket-predictor__team bracket-predictor__team--away bracket-predictor__team--selected" data-team="Germany">Germany</div>
    </article>
  </section>

  <!-- Round of 16: two filled matches. -->
  <section class="bracket-predictor__knockout" data-stage="round-of-16">
    <article class="bracket-predictor__match" data-stage="round-of-16" data-match-id="ro16-1" data-kickoff="2026-06-27T20:00:00Z">
      <div class="bracket-predictor__team bracket-predictor__team--home bracket-predictor__team--selected" data-team="Argentina">Argentina</div>
      <div class="bracket-predictor__team bracket-predictor__team--away" data-team="Australia">Australia</div>
    </article>
    <article class="bracket-predictor__match" data-stage="round-of-16" data-match-id="ro16-2" data-kickoff="2026-06-28T16:00:00Z">
      <div class="bracket-predictor__team bracket-predictor__team--home" data-team="Netherlands">Netherlands</div>
      <div class="bracket-predictor__team bracket-predictor__team--away bracket-predictor__team--selected" data-team="USA">USA</div>
    </article>
  </section>

  <!-- Quarterfinal: uses the data-winner attribute style rather than per-team class. -->
  <section class="bracket-predictor__knockout" data-stage="quarter-final">
    <article class="bracket-predictor__match" data-stage="quarter-final" data-match-id="qf-1" data-kickoff="2026-07-03T20:00:00Z" data-winner="Argentina">
      <div class="bracket-predictor__team bracket-predictor__team--home" data-team="Argentina">Argentina</div>
      <div class="bracket-predictor__team bracket-predictor__team--away" data-team="USA">USA</div>
    </article>
  </section>

  <!-- Semifinal: uses the advance ribbon. -->
  <section class="bracket-predictor__knockout" data-stage="semi-final">
    <article class="bracket-predictor__match" data-stage="semi-final" data-match-id="sf-1" data-kickoff="2026-07-08T20:00:00Z">
      <div class="bracket-predictor__team bracket-predictor__team--home" data-team="Argentina">Argentina</div>
      <div class="bracket-predictor__team bracket-predictor__team--away" data-team="France">France</div>
      <div class="bracket-predictor__advance" data-team="Argentina">Advances</div>
    </article>
  </section>

  <!-- Final: bracket-predictor__team--selected on home side, plus champion in footer. -->
  <section class="bracket-predictor__knockout" data-stage="final">
    <article class="bracket-predictor__match" data-stage="final" data-match-id="fin-1" data-kickoff="2026-07-19T20:00:00Z">
      <div class="bracket-predictor__team bracket-predictor__team--home bracket-predictor__team--selected" data-team="Argentina">Argentina</div>
      <div class="bracket-predictor__team bracket-predictor__team--away" data-team="Brazil">Brazil</div>
    </article>
  </section>

  <footer class="bracket-predictor__final">
    <div data-role="champion" data-team="Argentina">Argentina</div>
    <div data-role="runner-up" data-team="Brazil">Brazil</div>
  </footer>
</div>
</main>
</body>
</html>
