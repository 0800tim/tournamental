<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Exploded-isometric diagram of the Tournamental stack: marketing site, bracket app, watch-along renderer, Fastify services, MCP server feeding Claude Desktop and Cursor, Drips list anchoring the bottom">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0e1a2b"/>
    </linearGradient>
    <linearGradient id="layer" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#3c8bcf"/>
      <stop offset="1" stop-color="#1f5a99"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#b8862a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <g transform="translate(600,330)" font-family="DejaVu Sans, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">
    <g transform="translate(-280,-180) skewY(-12)">
      <rect width="180" height="60" rx="8" fill="url(#layer)" opacity="0.95"/>
      <text x="90" y="36">Marketing</text>
    </g>
    <g transform="translate(-90,-200) skewY(-12)">
      <rect width="180" height="60" rx="8" fill="url(#layer)"/>
      <text x="90" y="36">Bracket app</text>
    </g>
    <g transform="translate(100,-220) skewY(-12)">
      <rect width="180" height="60" rx="8" fill="url(#layer)" opacity="0.95"/>
      <text x="90" y="36">Watch renderer</text>
    </g>
    <g transform="translate(-340,-60) skewY(-12)">
      <rect width="120" height="50" rx="6" fill="#196a40"/>
      <text x="60" y="32">game</text>
    </g>
    <g transform="translate(-210,-50) skewY(-12)">
      <rect width="120" height="50" rx="6" fill="#196a40"/>
      <text x="60" y="32">identity</text>
    </g>
    <g transform="translate(-80,-40) skewY(-12)">
      <rect width="120" height="50" rx="6" fill="#196a40"/>
      <text x="60" y="32">vstamp</text>
    </g>
    <g transform="translate(50,-30) skewY(-12)">
      <rect width="120" height="50" rx="6" fill="#196a40"/>
      <text x="60" y="32">odds</text>
    </g>
    <g transform="translate(180,-20) skewY(-12)">
      <rect width="120" height="50" rx="6" fill="#196a40"/>
      <text x="60" y="32">clip</text>
    </g>
    <g transform="translate(-310,100) skewY(-12)">
      <rect width="280" height="60" rx="10" fill="url(#gold)"/>
      <text x="140" y="36" fill="#0a0e1a">MCP server -&gt; Claude / Cursor</text>
    </g>
    <g transform="translate(0,180) skewY(-12)">
      <rect width="320" height="60" rx="10" fill="#7e3c8b"/>
      <text x="160" y="36">Drips Network revenue split</text>
    </g>
  </g>
  <text x="80" y="120" font-family="DejaVu Sans, sans-serif" font-size="54" font-weight="800" fill="#fde68a" letter-spacing="-1">Stack at a glance</text>
  <text x="80" y="165" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="500" fill="#cdd5e7">Every layer of Tournamental, top to bottom.</text>
</svg>
