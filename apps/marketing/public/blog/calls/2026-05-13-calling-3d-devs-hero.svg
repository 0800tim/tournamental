<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Calling 3D developers — a stylised pitch with stadium silhouettes and a glowing ball">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0f1e2b"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#196a40"/>
      <stop offset="1" stop-color="#0d4226"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="500" rx="520" ry="80" fill="url(#pitch)"/>
  <g stroke="#7eb6e8" stroke-width="1" opacity="0.4" fill="none">
    <ellipse cx="600" cy="500" rx="520" ry="80"/>
    <ellipse cx="600" cy="500" rx="240" ry="36"/>
  </g>
  <circle cx="600" cy="320" r="160" fill="url(#glow)"/>
  <circle cx="600" cy="320" r="42" fill="#ffffff" stroke="#0a0e1a" stroke-width="3"/>
  <text x="600" y="135" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="64" font-weight="800" fill="#fde68a" letter-spacing="-1">Calling 3D devs</text>
  <text x="600" y="180" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="500" fill="#cdd5e7">Help us push the open-source match renderer further</text>
</svg>
