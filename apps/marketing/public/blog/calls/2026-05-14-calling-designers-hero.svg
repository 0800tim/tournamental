<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Calling designers — abstract grid of share cards and brackets in editorial pastels">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#1a1228"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7eb6e8"/>
      <stop offset="1" stop-color="#3c8bcf"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <g transform="translate(720,330)">
    <rect x="0" y="0" width="220" height="280" rx="16" fill="url(#cardA)" transform="rotate(-6)"/>
    <rect x="60" y="-30" width="220" height="280" rx="16" fill="url(#cardB)" transform="rotate(3)"/>
    <rect x="120" y="20" width="220" height="280" rx="16" fill="url(#cardC)" transform="rotate(12)"/>
  </g>
  <text x="80" y="150" font-family="DejaVu Sans, sans-serif" font-size="64" font-weight="800" fill="#fde68a" letter-spacing="-1">Calling designers</text>
  <text x="80" y="200" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="500" fill="#cdd5e7">Help us make the share cards people actually want to post</text>
</svg>
