<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Calling translators — speech bubbles in ten languages around a single microphone">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0a1e1e"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#b8862a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <g transform="translate(600,400)">
    <rect x="-30" y="-120" width="60" height="180" rx="30" fill="url(#mic)"/>
    <rect x="-50" y="60" width="100" height="14" rx="6" fill="#cdd5e7"/>
    <rect x="-10" y="74" width="20" height="60" fill="#7eb6e8"/>
  </g>
  <g font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="600" fill="#0a0e1a">
    <g transform="translate(140,330)"><rect width="140" height="48" rx="22" fill="#fde68a"/><text x="70" y="32" text-anchor="middle">GOOOL!</text></g>
    <g transform="translate(140,400)"><rect width="160" height="48" rx="22" fill="#7eb6e8"/><text x="80" y="32" text-anchor="middle">GOLAZO!</text></g>
    <g transform="translate(900,330)"><rect width="160" height="48" rx="22" fill="#f87171"/><text x="80" y="32" text-anchor="middle">but!</text></g>
    <g transform="translate(900,400)"><rect width="160" height="48" rx="22" fill="#34d399"/><text x="80" y="32" text-anchor="middle">GOLO!</text></g>
  </g>
  <text x="600" y="120" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="64" font-weight="800" fill="#fde68a" letter-spacing="-1">Calling translators</text>
  <text x="600" y="170" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="500" fill="#cdd5e7">Ten languages of live football commentary. Help us get it right.</text>
</svg>
