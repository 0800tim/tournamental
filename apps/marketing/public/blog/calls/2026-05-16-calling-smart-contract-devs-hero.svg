<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Calling smart-contract developers — an open vault revealing a stack of USDC and a Merkle proof">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#1e1208"/>
    </linearGradient>
    <linearGradient id="vault" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cdd5e7"/>
      <stop offset="1" stop-color="#6c7896"/>
    </linearGradient>
    <linearGradient id="usdc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c8bcf"/>
      <stop offset="1" stop-color="#1f5a99"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <g transform="translate(820,310)">
    <rect x="-180" y="-160" width="360" height="320" rx="20" fill="url(#vault)" opacity="0.9"/>
    <rect x="-160" y="-140" width="320" height="280" rx="14" fill="#101626"/>
    <g transform="translate(0,0)">
      <rect x="-100" y="-40" width="200" height="22" rx="11" fill="url(#usdc)"/>
      <rect x="-100" y="-10" width="200" height="22" rx="11" fill="url(#usdc)"/>
      <rect x="-100" y="20" width="200" height="22" rx="11" fill="url(#usdc)"/>
      <rect x="-100" y="50" width="200" height="22" rx="11" fill="url(#usdc)"/>
      <text x="0" y="-26" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="14" font-weight="800" fill="#ffffff">USDC</text>
    </g>
    <circle cx="170" cy="0" r="14" fill="url(#vault)"/>
    <circle cx="170" cy="0" r="6" fill="#0a0e1a"/>
  </g>
  <text x="80" y="150" font-family="DejaVu Sans, sans-serif" font-size="64" font-weight="800" fill="#fde68a" letter-spacing="-1">Calling on-chain devs</text>
  <text x="80" y="200" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="500" fill="#cdd5e7">Audit the Pool contracts before we move them to mainnet</text>
</svg>
