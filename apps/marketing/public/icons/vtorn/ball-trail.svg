<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
  <!-- Trail: three dashes diminishing in size + opacity, headed toward the
       ball at upper-right. -->
  <path d="M3 17 L7 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.35" />
  <path d="M7 14 L11 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.6" />
  <path d="M11 11 L15 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.85" />
  <!-- Ball -->
  <circle cx="17.5" cy="6.5" r="3.2" stroke="currentColor" stroke-width="1.4" fill="none" />
  <!-- Pentagon stitch hint inside the ball -->
  <path d="M17.5 4.7 L19 5.8 L18.4 7.6 L16.6 7.6 L16 5.8 Z" fill="currentColor" opacity="0.85" stroke="none" />
</svg>
