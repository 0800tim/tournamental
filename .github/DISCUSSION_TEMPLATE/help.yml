title: "[help] "
labels: ["help wanted", "q-and-a"]
body:
  - type: markdown
    attributes:
      value: |
        Stuck on something? You are in the right place. Maintainers and other contributors triage the Q&A category daily.

        If you have found a clear bug, please open a [bug issue](https://github.com/0800tim/tournamental/issues/new?template=bug.yml) instead so it lands on the triage board.

        Do **not** post security problems here. Use the security disclosure flow in [SECURITY.md](https://github.com/0800tim/tournamental/blob/main/SECURITY.md).
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: One or two sentences. The clearer the goal, the faster the answer.
      placeholder: I'm trying to wire @tournamental/bracket-engine into a Next.js 15 app router page and the scoring step throws on mount.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Steps you've already taken. Helps us skip the obvious.
      placeholder: |
        1. Cleared .next/ and reinstalled.
        2. Read packages/bracket-engine/README.md.
        3. Tried calling cascade() server-side; same error.
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Logs, stack traces, or screenshots
      description: Paste any error output inside a fenced code block.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Versions
      description: Package versions and commit (`git rev-parse HEAD` if you're on a checkout).
      placeholder: "@tournamental/bracket-engine@0.1.2, Node 20.12.0, commit abc1234"
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction (optional but powerful)
      description: A link to a fork, gist, or codesandbox that demonstrates the issue.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-post checklist
      options:
        - label: I searched the Q&A category for similar questions.
          required: true
        - label: I checked the [engineering log](https://tournamental.com/engineering) and the [README](https://github.com/0800tim/tournamental/blob/main/README.md) for an answer.
          required: true
        - label: This is not a security issue. (If it is, I'll use SECURITY.md instead.)
          required: true
        - label: I agree to the [Code of Conduct](https://github.com/0800tim/tournamental/blob/main/CODE_OF_CONDUCT.md).
          required: true
