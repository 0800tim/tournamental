version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Pacific/Auckland
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "deps:js"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Pacific/Auckland
    labels:
      - "deps"
      - "deps:ci"

  - package-ecosystem: pip
    directories:
      - "apps/statsbomb-replay"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Pacific/Auckland
    labels:
      - "deps"
      - "deps:py"
