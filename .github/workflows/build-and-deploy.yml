name: build-and-deploy

# Runs on every push to main, plus push to a `staging-*` branch (these
# deploy directly to staging without requiring a merge).
#
# Stages:
#   1. detect-changes  → list of apps to build (paths-filter)
#   2. build           → matrix per app, with persistent cache
#   3. test            → matrix per app (vitest --if-present)
#   4. deploy-staging  → SSH to deploy host; pnpm publish-all --env=staging
#   5. e2e-staging     → Playwright canonical happy-path against staging URL
#   6. notify          → GH summary + (optional) Slack/Discord
#
# Secrets used:
#   DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY  → for staging deploys
#   STAGING_BASE_URL                                  → e.g. https://dev.tournamental.com

on:
  push:
    branches:
      - main
      - 'staging-*'
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated app slugs (overrides change detection)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no real deploy)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      rebuild_all: ${{ steps.detect.outputs.rebuild_all }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install (deploy lib only)
        run: pnpm --filter @vtorn/cicd-tools install
      - name: Detect changed apps
        id: detect
        env:
          APPS_OVERRIDE: ${{ github.event.inputs.apps }}
        run: |
          set -euo pipefail
          if [ -n "${APPS_OVERRIDE:-}" ]; then
            echo "apps=$(echo "$APPS_OVERRIDE" | jq -R -s -c 'split(",") | map(select(. != ""))')" >> "$GITHUB_OUTPUT"
            echo "rebuild_all=false" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Use the lib's change-detection so the local + CI logic match.
          OUT=$(node --import tsx --eval "
            import('./infra/deploy/lib/changed-apps.js').then(m => {
              const r = m.detectChangedApps({ repoRoot: process.cwd(), range: 'origin/main~1..HEAD' });
              console.log(JSON.stringify(r));
            });
          ")
          REBUILD_ALL=$(echo "$OUT" | jq -r '.rebuildAll')
          if [ "$REBUILD_ALL" = "true" ]; then
            APPS=$(ls -1 apps | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            APPS=$(echo "$OUT" | jq -c '.apps')
          fi
          # Filter to apps with a .deploy/config.json
          DEPLOYABLE=$(echo "$APPS" | jq -c '[.[] | select(test("^[a-z0-9_-]+$"))]')
          DEPLOYABLE=$(node -e "
            const all = $DEPLOYABLE;
            const fs = require('node:fs');
            const out = all.filter(a => fs.existsSync('apps/' + a + '/.deploy/config.json'));
            console.log(JSON.stringify(out));
          ")
          echo "apps=$DEPLOYABLE" >> "$GITHUB_OUTPUT"
          echo "rebuild_all=$REBUILD_ALL" >> "$GITHUB_OUTPUT"
          if [ "$DEPLOYABLE" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected apps: $DEPLOYABLE"

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Next/Astro/tsc build cache
        uses: actions/cache@v5
        with:
          path: |
            apps/${{ matrix.app }}/.next/cache
            apps/${{ matrix.app }}/node_modules/.cache
            apps/${{ matrix.app }}/.astro
            apps/${{ matrix.app }}/dist/.tsbuildinfo
          key: build-cache-${{ matrix.app }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles(format('apps/{0}/**', matrix.app)) }}
          restore-keys: |
            build-cache-${{ matrix.app }}-${{ hashFiles('pnpm-lock.yaml') }}-
            build-cache-${{ matrix.app }}-

      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build app
        run: pnpm --filter "@vtorn/${{ matrix.app }}" --if-present run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: |
            apps/${{ matrix.app }}/.next
            apps/${{ matrix.app }}/dist
          if-no-files-found: ignore
          retention-days: 7

  test:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Test
        run: pnpm --filter "@vtorn/${{ matrix.app }}" --if-present run test

  deploy-staging:
    name: Deploy to staging
    needs: [detect-changes, build, test]
    if: needs.detect-changes.outputs.has_changes == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH (publish-all on host)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/vtorn
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            pnpm install --frozen-lockfile --prefer-offline
            APPS_ARG=""
            if [ -n "${{ github.event.inputs.apps }}" ]; then
              APPS_ARG="--apps=${{ github.event.inputs.apps }}"
            fi
            DRY=""
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              DRY="--dry-run"
            fi
            pnpm --filter @vtorn/cicd-tools run publish-all -- --env=staging --concurrency=4 $APPS_ARG $DRY

  e2e-staging:
    name: E2E vs staging
    needs: deploy-staging
    if: needs.detect-changes.outputs.has_changes == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Install Playwright
        run: |
          if [ -d apps/marketing/e2e ] || [ -d apps/web/playwright.config.ts ]; then
            npx playwright install --with-deps chromium
          else
            echo "no playwright suites; skipping"
          fi
      - name: Run E2E
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          if [ -d apps/marketing/e2e ]; then
            pnpm --filter @vtorn/marketing exec playwright test --project=chromium || exit 1
          fi

  notify:
    name: Summary
    needs: [detect-changes, build, test, deploy-staging]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write GH summary
        run: |
          {
            echo "## build-and-deploy summary"
            echo ""
            echo "- ref: \`${{ github.ref }}\`"
            echo "- changed apps: \`${{ needs.detect-changes.outputs.apps }}\`"
            echo "- rebuild-all: \`${{ needs.detect-changes.outputs.rebuild_all }}\`"
            echo "- build: \`${{ needs.build.result }}\`"
            echo "- test:  \`${{ needs.test.result }}\`"
            echo "- deploy-staging: \`${{ needs.deploy-staging.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
