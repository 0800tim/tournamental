name: Scaffolder staleness check

# Catches the most common dev-platform failure mode: a `create` CLI
# that worked on launch day and quietly broke a week later when Node
# moved or a transitive dep shifted. Runs weekly; opens an issue on
# failure rather than letting CI go red silently.

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scaffold-end-to-end:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Run scaffolder unit tests
        run: pnpm --filter @tournamental/create-app test

      - name: Scaffold a fresh plugin, install, and run its test
        run: |
          mkdir -p /tmp/scaffold-staleness
          cd /tmp/scaffold-staleness
          node ${{ github.workspace }}/packages/create-tournamental-app/src/index.mjs \
            --template plugin-scorer \
            --name freshness-check \
            --dir ./freshness-check
          cd freshness-check
          pnpm install
          pnpm typecheck
          pnpm test

      - name: Open staleness issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = `Scaffolder staleness check failed on Node ${{ matrix.node }}`;
            const body = [
              `The weekly scaffolder-staleness workflow failed on Node ${{ matrix.node }}.`,
              ``,
              `This means \`npm create @tournamental/app\` produces a project`,
              `that no longer builds or tests cleanly out of the box. A new`,
              `external contributor running the scaffolder right now would`,
              `see a broken project on first try, which is the #1 documented`,
              `developer-platform anti-pattern.`,
              ``,
              `Run:`,
              `  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              ``,
              `Fix path:`,
              `1. Reproduce locally: \`node packages/create-tournamental-app/src/index.mjs --template plugin-scorer --name x --dir /tmp/x && cd /tmp/x && pnpm install && pnpm test\``,
              `2. Bump template deps in \`packages/create-tournamental-app/templates/plugin-scorer/package.json\`.`,
              `3. Verify locally before pushing.`,
              ``,
              `Auto-opened by \`.github/workflows/scaffolder-staleness.yml\`.`
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["bug", "ci", "needs-triage", "demo-critical-path"]
            });
