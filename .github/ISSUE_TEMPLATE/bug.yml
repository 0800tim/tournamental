name: Bug report
description: Something is broken or behaving unexpectedly.
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please do **not** report security vulnerabilities here.
        Use the **Report a security vulnerability** template instead, or email security@vtourn.com.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I clicked X, Y appeared instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps that trigger the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse HEAD` or the deployed version.
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, browser, Node version, anything relevant.
    validations:
      required: false
